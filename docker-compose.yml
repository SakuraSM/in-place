name: inplace

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: inplace
      POSTGRES_USER: inplace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${POSTGRES_DATA_DIR:-./pg_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inplace -d inplace"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    restart: unless-stopped
    image: ghcr.io/sakurasm/inplace-server:latest
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://inplace:${POSTGRES_PASSWORD:?required}@postgres:5432/inplace
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://127.0.0.1:8080}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-random-32-character-secret}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-replace-with-a-random-32-character-secret}
      UPLOAD_DIR: ${UPLOAD_DIR:-./storage/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      BACKUP_PAYLOAD_SIZE_MB: ${BACKUP_PAYLOAD_SIZE_MB:-100}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ${UPLOAD_DIR:-./upload_data}:/app/storage/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/v1/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    restart: unless-stopped
    image: ghcr.io/sakurasm/inplace-web:latest
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  inplace_uploads_data:
