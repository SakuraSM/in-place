services:
  postgres:
    image: postgres:16-alpine
    container_name: inplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inplace
      POSTGRES_USER: inplace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inplace -d inplace"]
      interval: 5s
      timeout: 5s
      retries: 10
