name: Docker Images

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/docker-images.yml'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - 'apps/server/**'
      - 'apps/web/**'
      - 'packages/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/docker-images.yml'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - 'apps/server/**'
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: docker-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sakurasm/inplace

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: server
            dockerfile: apps/server/Dockerfile
            image_suffix: server
          - service: web
            dockerfile: apps/web/Dockerfile
            image_suffix: web
          - service: all-in-one
            dockerfile: docker/all-in-one.Dockerfile
            image_suffix: all-in-one

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and optionally push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: mode=max
          sbom: true
          build-args: |
            VITE_API_BASE_URL=/api

      - name: Generate build provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
