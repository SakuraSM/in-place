name: Mobile Apps

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/mobile-apps.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'apps/mobile/**'
      - 'packages/api-client/**'
      - 'packages/app-core/**'
      - 'packages/domain/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/mobile-apps.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'apps/mobile/**'
      - 'packages/api-client/**'
      - 'packages/app-core/**'
      - 'packages/domain/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: mobile-apps-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate mobile workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck --workspace @inplace/mobile

  eas-build:
    name: Build ${{ matrix.platform }} app
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && vars.EXPO_PROJECT_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - android
          - ios
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
      EAS_PROFILE: ${{ github.event.inputs.profile || 'production' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Skip build when EXPO_TOKEN is unavailable
        if: ${{ env.EXPO_TOKEN == '' }}
        run: echo "EXPO_TOKEN is not configured; skipping EAS build."

      - name: Build with EAS
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npx --yes eas-cli@18.8.1 build --platform ${{ matrix.platform }} --profile "$EAS_PROFILE" --non-interactive
        working-directory: apps/mobile
